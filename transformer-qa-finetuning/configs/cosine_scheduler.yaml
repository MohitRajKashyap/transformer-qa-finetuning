# ============================================================
# Cosine Scheduler Configuration
# Overrides default.yaml for cosine LR schedule experiment
# ============================================================

experiment:
  name: "distilbert-squad-v1-cosine"
  version: "1.0.0"
  seed: 42
  deterministic: true
  output_dir: "results"
  log_dir: "results/logs/cosine"
  checkpoint_dir: "results/checkpoints/cosine"

model:
  name: "distilbert-base-uncased"
  task: "question-answering"
  max_seq_length: 384
  doc_stride: 128
  max_query_length: 64
  n_best_size: 20
  max_answer_length: 30
  null_score_diff_threshold: 0.0

data:
  dataset_name: "squad"
  dataset_version: "plain_text"
  train_split: "train"
  validation_split: "validation"
  cache_dir: "data/processed"
  preprocessing_num_workers: 4
  overwrite_cache: false
  pad_to_max_length: false
  return_token_type_ids: false

training:
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  warmup_ratio: 0.06
  # KEY DIFFERENCE: cosine schedule with restarts
  lr_scheduler_type: "cosine_with_restarts"
  num_cycles: 1
  fp16: true
  fp16_opt_level: "O1"
  dataloader_num_workers: 4
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  early_stopping_patience: 2
  logging_steps: 100
  save_total_limit: 3
  report_to: ["tensorboard"]

evaluation:
  squad_v2: false
  compute_calibration: true
  num_calibration_bins: 15

wandb:
  enabled: false
  project: "transformer-qa-finetuning"
  entity: null
  tags: ["distilbert", "squad", "qa", "cosine-schedule"]
